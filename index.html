<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 优化 viewport，确保原生滚动和防止缩放 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <!-- iOS PWA 专属 Meta 标签 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="财富账本">
    <link rel="apple-touch-icon" href="https://api.iconify.design/lucide:wallet.svg">
    
    <title>晶晶的财富账本</title>
    
    <!-- 引入 Tailwind CSS (CDN 方式) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            spacing: {
              'safe-bottom': 'env(safe-area-inset-bottom)',
            }
          }
        }
      }
    </script>
    
    <!-- 引入 React 18 核心库 -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- 引入 Babel 编译器 (用于在浏览器端编译 JSX) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* 全局及滚动条样式优化 */
        * { -webkit-tap-highlight-color: transparent; }
        
        /* 隐藏整个网页的滚动条但保持可滚动 (针对移动端更美观) */
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }
        
        /* 局部区域（如弹窗内、流水列表）保留极细滚动条 */
        .custom-scrollbar::-webkit-scrollbar { width: 3px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
        
        /* 动画效果 */
        .animate-fade-in { animation: fadeIn 0.2s ease-out forwards; }
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        
        body { 
            background-color: #f8fafc; /* 更柔和的背景色 */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            /* 允许 Y 轴滚动，移除之前的 overscroll-behavior 限制 */
            overflow-y: auto;
            -webkit-overflow-scrolling: touch; /* 开启 iOS 流畅滚动 */
        }
        
        /* 确保根节点撑满屏幕 */
        #root {
            min-height: 100vh;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // ==========================================
        // 1. 原生 SVG 图标组件 (彻底替换第三方依赖)
        // ==========================================
        const Wallet = ({ size=24, className="" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></svg>
        );
        const Coins = ({ size=24, className="" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="8" cy="8" r="6"/><path d="M18.09 10.37A6 6 0 1 1 10.34 18"/><path d="M7 6h1v4"/><path d="m16.71 13.88.7.71-2.82 2.82"/></svg>
        );
        const TrendingUp = ({ size=24, className="" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
        );
        const TrendingDown = ({ size=24, className="" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 17 13.5 8.5 8.5 13.5 2 7"/><polyline points="16 17 22 17 22 11"/></svg>
        );
        const Watch = ({ size=24, className="" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="7"/><polyline points="12 9 12 12 13.5 13.5"/><path d="M16.51 17.35l-.35 3.83a2 2 0 0 1-2 1.82H9.83a2 2 0 0 1-2-1.82l-.35-3.83m.01-10.7l.35-3.83A2 2 0 0 1 9.83 1h4.35a2 2 0 0 1 2 1.82l.35 3.83"/></svg>
        );
        const PlusCircle = ({ size=24, className="" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        );
        const Trash2 = ({ size=24, className="" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
        );
        const Edit3 = ({ size=24, className="" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        );
        const Save = ({ size=24, className="" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        );
        const CalculatorIcon = ({ size=24, className="" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="16" y1="14" x2="16" y2="18"/><path d="M8 10h.01"/><path d="M12 10h.01"/><path d="M16 10h.01"/><path d="M8 14h.01"/><path d="M12 14h.01"/><path d="M8 18h.01"/><path d="M12 18h.01"/></svg>
        );
        const X = ({ size=24, className="" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        );
        const SettingsIcon = ({ size=24, className="" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
        );
        const RefreshCw = ({ size=24, className="" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        );
        const Download = ({ size=24, className="" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        );
        const Upload = ({ size=24, className="" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        );
        const HardDrive = ({ size=24, className="" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="12" x2="2" y2="12"/><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/><line x1="6" y1="16" x2="6.01" y2="16"/><line x1="10" y1="16" x2="10.01" y2="16"/></svg>
        );

        // ==========================================
        // 2. 独立设置弹窗组件
        // ==========================================
        const SettingsModal = ({ isOpen, onClose, config, setConfig }) => {
          const [localConfig, setLocalConfig] = useState(config);

          useEffect(() => {
            if (isOpen) {
              setLocalConfig(config);
            }
          }, [isOpen, config]);

          if (!isOpen) return null;

          const handleConfigChange = (field, value) => {
            setLocalConfig(prev => ({ ...prev, [field]: value }));
          };

          const updateList = (field, index, value) => {
            const newList = [...localConfig[field]];
            newList[index] = value;
            handleConfigChange(field, newList);
          };

          const addToList = (field) => {
            handleConfigChange(field, [...localConfig[field], '新选项']);
          };

          const removeFromList = (field, index) => {
            const newList = localConfig[field].filter((_, i) => i !== index);
            handleConfigChange(field, newList);
          };

          const handleSave = () => {
            setConfig(localConfig);
            onClose();
          };

          return (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4 animate-fade-in">
              <div className="bg-white rounded-[24px] shadow-2xl w-full max-w-md max-h-[85vh] flex flex-col relative overflow-hidden">
                
                {/* 弹窗头部，固定不动 */}
                <div className="px-5 py-4 border-b border-slate-100 flex justify-between items-center bg-white z-10">
                  <h2 className="text-lg font-bold text-slate-800 flex items-center">
                    <SettingsIcon size={20} className="mr-2 text-slate-600" />
                    系统偏好设置
                  </h2>
                  <button onClick={onClose} className="p-2 text-slate-400 hover:text-slate-600 hover:bg-slate-100 rounded-full transition-colors">
                    <X size={20} />
                  </button>
                </div>
                
                {/* 弹窗内容区，允许独立滚动 */}
                <div className="flex-1 overflow-y-auto p-5 space-y-6 custom-scrollbar -webkit-overflow-scrolling-touch">
                  
                  <section>
                    <h3 className="text-sm font-semibold text-slate-700 mb-3">基础名称修改</h3>
                    <div className="space-y-3 bg-slate-50 p-4 rounded-2xl border border-slate-100">
                      <div>
                        <label className="block text-xs text-slate-500 mb-1.5">账本名称</label>
                        <input type="text" value={localConfig.appName} onChange={e => handleConfigChange('appName', e.target.value)} className="w-full px-3 py-2.5 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm shadow-sm" />
                      </div>
                      <div>
                        <label className="block text-xs text-slate-500 mb-1.5">现金账户名称</label>
                        <input type="text" value={localConfig.cashAccountName} onChange={e => handleConfigChange('cashAccountName', e.target.value)} className="w-full px-3 py-2.5 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none text-sm shadow-sm" />
                      </div>
                      <div>
                        <label className="block text-xs text-slate-500 mb-1.5">固定资产名称</label>
                        <input type="text" value={localConfig.fixedAssetName} onChange={e => handleConfigChange('fixedAssetName', e.target.value)} className="w-full px-3 py-2.5 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm shadow-sm" />
                      </div>
                    </div>
                  </section>

                  <section>
                    <div className="flex justify-between items-center mb-3">
                      <h3 className="text-sm font-semibold text-slate-700">买入支付方式</h3>
                      <button onClick={() => addToList('buyMethods')} className="text-amber-600 bg-amber-50 hover:bg-amber-100 px-2 py-1 rounded-lg text-xs flex items-center transition-colors">
                        <PlusCircle size={14} className="mr-1"/> 添加项
                      </button>
                    </div>
                    <div className="space-y-2 bg-slate-50 p-4 rounded-2xl border border-slate-100">
                      {localConfig.buyMethods.map((method, idx) => (
                        <div key={idx} className="flex items-center space-x-2">
                          <input 
                            type="text" 
                            value={method} 
                            onChange={e => updateList('buyMethods', idx, e.target.value)} 
                            className="flex-1 px-3 py-2 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-amber-500 outline-none text-sm shadow-sm" 
                          />
                          <button onClick={() => removeFromList('buyMethods', idx)} className="p-2 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-xl transition-colors">
                            <Trash2 size={18} />
                          </button>
                        </div>
                      ))}
                    </div>
                  </section>

                  <section>
                    <div className="flex justify-between items-center mb-3">
                      <h3 className="text-sm font-semibold text-slate-700">卖出收款方式</h3>
                      <button onClick={() => addToList('sellMethods')} className="text-blue-600 bg-blue-50 hover:bg-blue-100 px-2 py-1 rounded-lg text-xs flex items-center transition-colors">
                        <PlusCircle size={14} className="mr-1"/> 添加项
                      </button>
                    </div>
                    <div className="space-y-2 bg-slate-50 p-4 rounded-2xl border border-slate-100">
                      {localConfig.sellMethods.map((method, idx) => (
                        <div key={idx} className="flex items-center space-x-2">
                          <input 
                            type="text" 
                            value={method} 
                            onChange={e => updateList('sellMethods', idx, e.target.value)} 
                            className="flex-1 px-3 py-2 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm shadow-sm" 
                          />
                          <button onClick={() => removeFromList('sellMethods', idx)} className="p-2 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-xl transition-colors">
                            <Trash2 size={18} />
                          </button>
                        </div>
                      ))}
                    </div>
                  </section>
                </div>

                {/* 底部按钮区，固定不动 */}
                <div className="px-5 py-4 border-t border-slate-100 bg-white z-10">
                  <button 
                    onClick={handleSave}
                    className="w-full py-3.5 bg-slate-800 active:bg-slate-900 text-white rounded-xl font-medium transition-colors shadow-lg shadow-slate-800/20 flex items-center justify-center"
                  >
                    <Save size={18} className="mr-2" /> 保存并生效配置
                  </button>
                </div>
              </div>
            </div>
          );
        };

        // ==========================================
        // 3. 横板计算器组件
        // ==========================================
        const CalculatorModal = ({ isOpen, onClose }) => {
          const [display, setDisplay] = useState('0');
          const [prevValue, setPrevValue] = useState(null);
          const [operator, setOperator] = useState(null);
          const [waitingForOperand, setWaitingForOperand] = useState(false);

          if (!isOpen) return null;

          const inputDigit = (digit) => {
            if (waitingForOperand) {
              setDisplay(String(digit));
              setWaitingForOperand(false);
            } else {
              setDisplay(display === '0' ? String(digit) : display + digit);
            }
          };

          const inputDot = () => {
            if (waitingForOperand) {
              setDisplay('0.');
              setWaitingForOperand(false);
            } else if (display.indexOf('.') === -1) {
              setDisplay(display + '.');
            }
          };

          const clear = () => {
            setDisplay('0');
            setPrevValue(null);
            setOperator(null);
            setWaitingForOperand(false);
          };

          const toggleSign = () => {
            setDisplay(String(parseFloat(display) * -1));
          };

          const inputPercent = () => {
            setDisplay(String(parseFloat(display) / 100));
          };

          const performOperation = (nextOperator) => {
            const inputValue = parseFloat(display);
            if (prevValue == null) {
              setPrevValue(inputValue);
            } else if (operator) {
              const currentValue = prevValue || 0;
              let newValue = currentValue;
              if (operator === '+') newValue = currentValue + inputValue;
              else if (operator === '-') newValue = currentValue - inputValue;
              else if (operator === '×') newValue = currentValue * inputValue;
              else if (operator === '÷') newValue = currentValue / inputValue;

              newValue = parseFloat(newValue.toFixed(10));
              setPrevValue(newValue);
              setDisplay(String(newValue));
            }
            setWaitingForOperand(true);
            setOperator(nextOperator);
          };

          const handleEqual = () => {
            if (operator && prevValue != null) {
              performOperation(operator);
              setOperator(null);
              setPrevValue(null);
              setWaitingForOperand(true);
            }
          };

          return (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4 animate-fade-in">
              <div className="bg-white rounded-[24px] shadow-2xl w-full max-w-[400px] p-5 md:p-6 flex flex-col">
                <div className="flex justify-between items-center mb-4 px-1">
                  <span className="text-sm font-semibold text-slate-500 flex items-center">
                    <CalculatorIcon size={16} className="mr-1.5"/> 便捷计算器
                  </span>
                  <button onClick={onClose} className="p-1.5 text-slate-400 hover:bg-slate-100 rounded-full transition-colors"><X size={20}/></button>
                </div>

                <div className="mb-5 p-4 md:p-5 bg-slate-50 rounded-[20px] border border-slate-100 shadow-inner">
                  <div className="text-right text-4xl md:text-5xl font-light text-slate-800 overflow-hidden text-ellipsis whitespace-nowrap tracking-tight font-mono">
                    {display}
                  </div>
                </div>

                <div className="grid grid-cols-4 gap-2.5 md:gap-3">
                  <button onClick={clear} className="col-span-1 aspect-square md:aspect-auto md:py-4 bg-slate-100 active:bg-slate-200 text-slate-600 rounded-[16px] font-medium text-lg transition-colors">AC</button>
                  <button onClick={toggleSign} className="col-span-1 aspect-square md:aspect-auto md:py-4 bg-slate-100 active:bg-slate-200 text-slate-600 rounded-[16px] font-medium text-lg transition-colors">±</button>
                  <button onClick={inputPercent} className="col-span-1 aspect-square md:aspect-auto md:py-4 bg-slate-100 active:bg-slate-200 text-slate-600 rounded-[16px] font-medium text-lg transition-colors">%</button>
                  <button onClick={() => performOperation('÷')} className={`col-span-1 aspect-square md:aspect-auto md:py-4 rounded-[16px] font-medium text-2xl transition-colors ${operator === '÷' && waitingForOperand ? 'bg-amber-500 text-white shadow-lg shadow-amber-500/30' : 'bg-amber-100 text-amber-600 active:bg-amber-200'}`}>÷</button>

                  <button onClick={() => inputDigit(7)} className="col-span-1 aspect-square md:aspect-auto md:py-4 bg-white active:bg-slate-50 text-slate-800 rounded-[16px] font-medium text-2xl transition-colors shadow-sm border border-slate-100">7</button>
                  <button onClick={() => inputDigit(8)} className="col-span-1 aspect-square md:aspect-auto md:py-4 bg-white active:bg-slate-50 text-slate-800 rounded-[16px] font-medium text-2xl transition-colors shadow-sm border border-slate-100">8</button>
                  <button onClick={() => inputDigit(9)} className="col-span-1 aspect-square md:aspect-auto md:py-4 bg-white active:bg-slate-50 text-slate-800 rounded-[16px] font-medium text-2xl transition-colors shadow-sm border border-slate-100">9</button>
                  <button onClick={() => performOperation('×')} className={`col-span-1 aspect-square md:aspect-auto md:py-4 rounded-[16px] font-medium text-2xl transition-colors ${operator === '×' && waitingForOperand ? 'bg-amber-500 text-white shadow-lg shadow-amber-500/30' : 'bg-amber-100 text-amber-600 active:bg-amber-200'}`}>×</button>

                  <button onClick={() => inputDigit(4)} className="col-span-1 aspect-square md:aspect-auto md:py-4 bg-white active:bg-slate-50 text-slate-800 rounded-[16px] font-medium text-2xl transition-colors shadow-sm border border-slate-100">4</button>
                  <button onClick={() => inputDigit(5)} className="col-span-1 aspect-square md:aspect-auto md:py-4 bg-white active:bg-slate-50 text-slate-800 rounded-[16px] font-medium text-2xl transition-colors shadow-sm border border-slate-100">5</button>
                  <button onClick={() => inputDigit(6)} className="col-span-1 aspect-square md:aspect-auto md:py-4 bg-white active:bg-slate-50 text-slate-800 rounded-[16px] font-medium text-2xl transition-colors shadow-sm border border-slate-100">6</button>
                  <button onClick={() => performOperation('-')} className={`col-span-1 aspect-square md:aspect-auto md:py-4 rounded-[16px] font-medium text-2xl transition-colors ${operator === '-' && waitingForOperand ? 'bg-amber-500 text-white shadow-lg shadow-amber-500/30' : 'bg-amber-100 text-amber-600 active:bg-amber-200'}`}>-</button>

                  <button onClick={() => inputDigit(1)} className="col-span-1 aspect-square md:aspect-auto md:py-4 bg-white active:bg-slate-50 text-slate-800 rounded-[16px] font-medium text-2xl transition-colors shadow-sm border border-slate-100">1</button>
                  <button onClick={() => inputDigit(2)} className="col-span-1 aspect-square md:aspect-auto md:py-4 bg-white active:bg-slate-50 text-slate-800 rounded-[16px] font-medium text-2xl transition-colors shadow-sm border border-slate-100">2</button>
                  <button onClick={() => inputDigit(3)} className="col-span-1 aspect-square md:aspect-auto md:py-4 bg-white active:bg-slate-50 text-slate-800 rounded-[16px] font-medium text-2xl transition-colors shadow-sm border border-slate-100">3</button>
                  <button onClick={() => performOperation('+')} className={`col-span-1 aspect-square md:aspect-auto md:py-4 rounded-[16px] font-medium text-2xl transition-colors ${operator === '+' && waitingForOperand ? 'bg-amber-500 text-white shadow-lg shadow-amber-500/30' : 'bg-amber-100 text-amber-600 active:bg-amber-200'}`}>+</button>

                  <button onClick={() => inputDigit(0)} className="col-span-2 md:aspect-auto md:py-4 bg-white active:bg-slate-50 text-slate-800 rounded-[16px] font-medium text-2xl transition-colors shadow-sm border border-slate-100 flex items-center pl-8">0</button>
                  <button onClick={inputDot} className="col-span-1 aspect-square md:aspect-auto md:py-4 bg-white active:bg-slate-50 text-slate-800 rounded-[16px] font-medium text-3xl transition-colors shadow-sm border border-slate-100">.</button>
                  <button onClick={handleEqual} className="col-span-1 aspect-square md:aspect-auto md:py-4 bg-amber-500 active:bg-amber-600 text-white rounded-[16px] font-medium text-3xl transition-colors shadow-lg shadow-amber-500/40">=</button>
                </div>
              </div>
            </div>
          );
        };

        // ==========================================
        // 4. 主体应用组件 (核心逻辑 + 本地存储)
        // ==========================================
        function App() {
          // --- 从 localStorage 初始化数据 ---
          const loadInitialConfig = () => {
            const saved = localStorage.getItem('ledger_config');
            return saved ? JSON.parse(saved) : {
              appName: '晶晶的财富账本',
              cashAccountName: '现金账户',
              fixedAssetName: '固定资产',
              buyMethods: ['现金', '手表', '独立资金', '妈妈代付', '爸爸代付', '他人代付'],
              sellMethods: ['现金', '手表']
            };
          };

          const loadInitialSettings = () => {
            const saved = localStorage.getItem('ledger_settings');
            return saved ? JSON.parse(saved) : {
              realTimeGoldPrice: 1150.3,
              initialCash: 439.9,
              watchAsset: 559.4,
            };
          };

          const loadInitialTransactions = () => {
            const saved = localStorage.getItem('ledger_transactions');
            return saved ? JSON.parse(saved) : [
              { id: 1, type: 'gold_buy', date: '2026-01-17', grams: 1, price: 1075, paymentMethod: '独立资金', note: '买入黄金' },
              { id: 2, type: 'gold_buy', date: '2026-02-28', grams: 2, price: 1193, paymentMethod: '独立资金', note: '买入黄金' },
              { id: 3, type: 'cash_expense', date: '2026-03-11', amount: 128, paymentMethod: '现金', note: '妈妈生日礼物 银戒指' },
            ];
          };

          // --- 状态定义 ---
          const [config, setConfig] = useState(loadInitialConfig);
          const [settings, setSettings] = useState(loadInitialSettings);
          const [transactions, setTransactions] = useState(loadInitialTransactions);

          // --- 监听状态变化并自动保存到 localStorage ---
          useEffect(() => {
            localStorage.setItem('ledger_config', JSON.stringify(config));
          }, [config]);

          useEffect(() => {
            localStorage.setItem('ledger_settings', JSON.stringify(settings));
          }, [settings]);

          useEffect(() => {
            localStorage.setItem('ledger_transactions', JSON.stringify(transactions));
          }, [transactions]);

          const getCurrentDate = () => {
            const now = new Date();
            const offset = now.getTimezoneOffset() * 60000;
            return new Date(now - offset).toISOString().split('T')[0];
          };

          const [activeTab, setActiveTab] = useState('gold');
          
          const [goldForm, setGoldForm] = useState({
            date: getCurrentDate(),
            type: 'gold_buy',
            paymentMethod: '现金',
            grams: '',
            price: '',
            note: ''
          });

          const [cashForm, setCashForm] = useState({
            date: getCurrentDate(),
            type: 'cash_expense',
            paymentMethod: '现金',
            amount: '',
            note: ''
          });

          const [isEditingSettings, setIsEditingSettings] = useState(false);
          const [isCalcOpen, setIsCalcOpen] = useState(false);
          const [isSettingsOpen, setIsSettingsOpen] = useState(false);
          const [isBackupOpen, setIsBackupOpen] = useState(false);
          const [isFetchingGold, setIsFetchingGold] = useState(false);
          const [deleteConfirm, setDeleteConfirm] = useState({ isOpen: false, id: null });

          // --- 数据导出 (下载备份文件) ---
          const handleExportData = () => {
            const dataToSave = { config, settings, transactions, exportDate: new Date().toISOString() };
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(dataToSave));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            const dateStr = new Date().toISOString().split('T')[0];
            downloadAnchorNode.setAttribute("download", `晶晶的账本备份_${dateStr}.json`);
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
            
            alert("✅ 备份文件已成功下载！\n如果您后续清理了浏览器缓存，可通过此文件恢复所有数据。");
            setIsBackupOpen(false);
          };

          // --- 数据导入 (恢复备份文件) ---
          const handleImportData = (event) => {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
              try {
                const importedData = JSON.parse(e.target.result);
                if (importedData.config && importedData.settings && importedData.transactions) {
                  setConfig(importedData.config);
                  setSettings(importedData.settings);
                  setTransactions(importedData.transactions);
                  alert("🎉 数据恢复成功！");
                  setIsBackupOpen(false);
                } else {
                  alert("❌ 导入失败：备份文件格式不正确。");
                }
              } catch (error) {
                alert("❌ 导入失败：无法读取文件内容，可能文件已损坏。");
              }
            };
            reader.readAsText(file);
            event.target.value = '';
          };

          // --- 获取金价 (双路备选) ---
          const fetchGoldPrice = async () => {
            setIsFetchingGold(true);
            try {
              const tencentUrl = 'https://qt.gtimg.cn/q=hj_Au9999';
              const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(tencentUrl)}`;
              const response = await fetch(proxyUrl);
              if (response.ok) {
                const text = await response.text();
                const match = text.match(/="([^"]+)"/);
                if (match && match[1]) {
                  const values = match[1].split('~');
                  let price = parseFloat(values[3]);
                  if (price > 100 && price < 2000) {
                    setSettings(prev => ({ ...prev, realTimeGoldPrice: parseFloat(price.toFixed(2)) }));
                    setIsFetchingGold(false);
                    return;
                  }
                }
              }
            } catch (err) { console.warn('获取国内金价失败，准备回退', err); }

            try {
              const response = await fetch('https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/xau.json');
              if (response.ok) {
                const data = await response.json();
                if (data && data.xau && data.xau.cny) {
                  const pricePerGram = data.xau.cny / 31.1034768;
                  setSettings(prev => ({ ...prev, realTimeGoldPrice: parseFloat(pricePerGram.toFixed(2)) }));
                }
              }
            } catch (err) { console.error('获取金价均失败'); } 
            finally { setIsFetchingGold(false); }
          };

          useEffect(() => { fetchGoldPrice(); }, []);

          // --- 核心财务结算 ---
          const summary = useMemo(() => {
            let totalGrams = 0;
            let totalBuyCost = 0;
            let totalSellIncome = 0;
            let cashBalance = settings.initialCash;
            let dynamicWatchAsset = settings.watchAsset;

            transactions.forEach(t => {
              if (t.type === 'gold_buy') {
                const cost = t.grams * t.price;
                totalGrams += t.grams;
                totalBuyCost += cost;
                if (t.paymentMethod === '现金' || t.paymentMethod === config.cashAccountName) cashBalance -= cost;
                else if (t.paymentMethod === '手表' || t.paymentMethod === config.fixedAssetName) dynamicWatchAsset -= cost;
              } else if (t.type === 'gold_sell') {
                const income = t.grams * t.price;
                totalGrams -= t.grams;
                totalSellIncome += income;
                if (t.paymentMethod === '现金' || t.paymentMethod === config.cashAccountName) cashBalance += income;
                else if (t.paymentMethod === '手表' || t.paymentMethod === config.fixedAssetName) dynamicWatchAsset += income;
              } else if (t.type === 'cash_income') {
                if (t.paymentMethod === '手表' || t.paymentMethod === config.fixedAssetName) dynamicWatchAsset += t.amount;
                else cashBalance += t.amount;
              } else if (t.type === 'cash_expense') {
                if (t.paymentMethod === '手表' || t.paymentMethod === config.fixedAssetName) dynamicWatchAsset -= t.amount;
                else cashBalance -= t.amount;
              }
            });

            const goldAssetValue = totalGrams * settings.realTimeGoldPrice;
            const goldProfit = totalSellIncome + goldAssetValue - totalBuyCost;
            const totalAsset = goldAssetValue + cashBalance + dynamicWatchAsset;

            return { totalGrams, goldAssetValue, goldProfit, cashBalance, dynamicWatchAsset, totalAsset };
          }, [transactions, settings, config]);

          const handleGoldSubmit = (e) => {
            e.preventDefault();
            if (!goldForm.grams || !goldForm.price) return;
            const newTx = { ...goldForm, id: Date.now(), grams: parseFloat(goldForm.grams), price: parseFloat(goldForm.price) };
            setTransactions([newTx, ...transactions].sort((a, b) => new Date(b.date) - new Date(a.date)));
            setGoldForm({ ...goldForm, date: getCurrentDate(), grams: '', price: '', note: '' });
          };

          const handleCashSubmit = (e) => {
            e.preventDefault();
            if (!cashForm.amount || !cashForm.note) return;
            const newTx = { ...cashForm, id: Date.now(), amount: parseFloat(cashForm.amount) };
            setTransactions([newTx, ...transactions].sort((a, b) => new Date(b.date) - new Date(a.date)));
            setCashForm({ ...cashForm, date: getCurrentDate(), amount: '', note: '' });
          };

          const requestDelete = (id) => setDeleteConfirm({ isOpen: true, id });
          const confirmDelete = () => {
            setTransactions(transactions.filter(t => t.id !== deleteConfirm.id));
            setDeleteConfirm({ isOpen: false, id: null });
          };

          return (
            // 【关键修改】去掉了 touch-none，改为了更合理的移动端外层容器
            <div className="min-h-screen bg-slate-50 text-slate-800 font-sans w-full overflow-x-hidden">
              
              {/* 主内容区，底部增加 pb-safe 适配 iPhone 底部黑条 */}
              <div className="max-w-md mx-auto w-full px-3 md:px-4 pt-4 pb-20 md:pb-10 pb-safe space-y-4 md:space-y-6">
                
                {/* 头部 (更紧凑的手机端布局) */}
                <header className="flex justify-between items-center bg-white p-3 md:p-4 rounded-[20px] shadow-sm border border-slate-100 sticky top-2 z-30">
                  <div className="flex items-center space-x-2.5">
                    <div className="bg-amber-100 p-2 rounded-xl text-amber-600">
                      <Coins size={24} />
                    </div>
                    <div>
                      <h1 className="text-lg md:text-xl font-bold text-slate-900 tracking-tight leading-tight">{config.appName}</h1>
                      <p className="text-[10px] md:text-xs text-slate-500 font-medium">离线安全版</p>
                    </div>
                  </div>
                  <div className="flex space-x-1">
                    <button onClick={() => setIsBackupOpen(true)} className="p-2 text-slate-400 hover:text-emerald-600 bg-slate-50 rounded-full active:scale-90 transition-transform" title="数据安全">
                      <HardDrive size={18} />
                    </button>
                    <button onClick={() => setIsSettingsOpen(true)} className="p-2 text-slate-400 hover:text-slate-700 bg-slate-50 rounded-full active:scale-90 transition-transform" title="偏好设置">
                      <SettingsIcon size={18} />
                    </button>
                    <button onClick={() => setIsCalcOpen(true)} className="p-2 text-slate-400 hover:text-blue-600 bg-slate-50 rounded-full active:scale-90 transition-transform" title="计算器">
                      <CalculatorIcon size={18} />
                    </button>
                    <button onClick={() => setIsEditingSettings(!isEditingSettings)} className="p-2 text-slate-400 hover:text-amber-600 bg-slate-50 rounded-full active:scale-90 transition-transform" title="调价">
                      {isEditingSettings ? <Save size={18} /> : <Edit3 size={18} />}
                    </button>
                  </div>
                </header>

                {/* 备份面板 */}
                {isBackupOpen && (
                  <div className="bg-emerald-50 rounded-[20px] p-4 border border-emerald-100/60 animate-fade-in shadow-sm">
                    <div className="flex justify-between items-center mb-3">
                      <h3 className="font-bold text-emerald-800 text-sm flex items-center">
                        <HardDrive size={16} className="mr-1.5"/> 数据安全中心
                      </h3>
                      <button onClick={() => setIsBackupOpen(false)} className="text-emerald-400 hover:text-emerald-700 p-1"><X size={16}/></button>
                    </div>
                    <p className="text-[11px] leading-relaxed text-emerald-700 mb-3">
                      建议定期点击“导出备份”。若清理微信或浏览器缓存导致数据丢失，可用备份文件一键恢复。
                    </p>
                    <div className="flex gap-2">
                      <button onClick={handleExportData} className="flex-1 py-2.5 bg-emerald-500 active:bg-emerald-600 text-white rounded-xl text-xs font-medium transition-all flex items-center justify-center shadow-sm">
                        <Download size={14} className="mr-1" /> 导出备份
                      </button>
                      <div className="flex-1 relative">
                        <input type="file" accept=".json" onChange={handleImportData} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" />
                        <button className="w-full h-full py-2.5 bg-white border border-emerald-200 text-emerald-600 rounded-xl text-xs font-medium flex items-center justify-center shadow-sm pointer-events-none">
                          <Upload size={14} className="mr-1" /> 恢复数据
                        </button>
                      </div>
                    </div>
                  </div>
                )}

                {/* 快速调价区 */}
                {isEditingSettings && (
                  <div className="bg-amber-50 rounded-[20px] p-4 border border-amber-100/60 animate-fade-in shadow-sm grid grid-cols-2 gap-3">
                    <div className="col-span-2 flex justify-between items-center bg-white p-2.5 rounded-xl border border-amber-100 shadow-sm">
                        <label className="text-xs font-semibold text-amber-800 flex items-center">
                            今日金价
                            <input type="number" step="0.1" value={settings.realTimeGoldPrice} onChange={e => setSettings({...settings, realTimeGoldPrice: parseFloat(e.target.value) || 0})} className="ml-2 w-20 px-2 py-1 bg-slate-50 border border-slate-200 rounded-lg outline-none text-sm text-center" />
                        </label>
                        <button onClick={fetchGoldPrice} className="text-amber-600 bg-amber-100/50 active:bg-amber-200 px-2 py-1.5 rounded-lg transition-colors text-xs flex items-center">
                          <RefreshCw size={12} className={`mr-1 ${isFetchingGold ? 'animate-spin' : ''}`} />
                          同步
                        </button>
                    </div>
                    <div>
                      <label className="block text-[10px] font-semibold text-slate-500 mb-1 pl-1">初始现金 (元)</label>
                      <input type="number" step="0.1" value={settings.initialCash} onChange={e => setSettings({...settings, initialCash: parseFloat(e.target.value) || 0})} className="w-full px-3 py-2 bg-white border border-slate-200 rounded-xl outline-none text-sm shadow-sm" />
                    </div>
                    <div>
                      <label className="block text-[10px] font-semibold text-slate-500 mb-1 pl-1">固定资产 (元)</label>
                      <input type="number" step="0.1" value={settings.watchAsset} onChange={e => setSettings({...settings, watchAsset: parseFloat(e.target.value) || 0})} className="w-full px-3 py-2 bg-white border border-slate-200 rounded-xl outline-none text-sm shadow-sm" />
                    </div>
                  </div>
                )}

                {/* 核心资产大盘看板 (手机端紧凑设计) */}
                <section className="grid grid-cols-2 gap-3">
                  {/* 总资产 横跨整排 */}
                  <div className="col-span-2 bg-gradient-to-br from-slate-900 to-slate-800 rounded-[24px] p-5 text-white shadow-lg relative overflow-hidden active:scale-[0.99] transition-transform">
                    <div className="absolute -right-6 -bottom-6 opacity-10"><Wallet size={120} /></div>
                    <p className="text-slate-300 text-xs font-medium mb-1 relative z-10 opacity-90">合计总资产 (元)</p>
                    <p className="text-3xl md:text-4xl font-bold tracking-tight relative z-10 font-mono">
                      {summary.totalAsset.toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}
                    </p>
                  </div>

                  {/* 黄金资产 横跨整排 */}
                  <div className="col-span-2 bg-white rounded-[20px] p-4 border border-slate-100 shadow-sm active:bg-slate-50 transition-colors">
                    <div className="flex justify-between items-start mb-3">
                      <div className="flex items-center space-x-2">
                        <div className="bg-amber-100 p-1.5 rounded-lg text-amber-600"><Coins size={16} /></div>
                        <h3 className="font-bold text-slate-700 text-sm">黄金资产</h3>
                      </div>
                      <div className="text-right">
                        <p className="text-[10px] text-slate-400">总持仓</p>
                        <p className="font-bold text-amber-600 text-sm">{summary.totalGrams} g</p>
                      </div>
                    </div>
                    
                    <div className="flex justify-between items-end">
                        <div>
                            <p className="text-xl font-bold text-slate-800 font-mono">
                                ¥{summary.goldAssetValue.toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}
                            </p>
                            <div className="flex items-center mt-1 text-[11px]">
                                <span className="text-slate-400 mr-1.5">收益</span>
                                <span className={`flex items-center font-bold ${summary.goldProfit >= 0 ? 'text-red-500' : 'text-green-600'}`}>
                                {summary.goldProfit >= 0 ? <TrendingUp size={10} className="mr-0.5"/> : <TrendingDown size={10} className="mr-0.5"/>}
                                {summary.goldProfit > 0 ? '+' : ''}{summary.goldProfit.toFixed(2)}
                                </span>
                            </div>
                        </div>
                        
                        <div className="flex flex-col items-end">
                            <a href="https://www.cngold.org/img_date/bank_gold.html" target="_blank" className="text-[10px] text-blue-500 hover:underline mb-1">行情查询 ↗</a>
                            <div className="flex items-center text-[10px] text-slate-500 bg-slate-50 px-2 py-1 rounded-md border border-slate-100">
                                <span className="mr-1 font-medium">¥{settings.realTimeGoldPrice}/g</span>
                            </div>
                        </div>
                    </div>
                  </div>

                  {/* 现金与固定资产 并排 */}
                  <div className="bg-white rounded-[20px] p-4 border border-slate-100 shadow-sm active:bg-slate-50 transition-colors">
                    <div className="flex items-center space-x-1.5 mb-2">
                      <div className="bg-emerald-100 p-1.5 rounded-lg text-emerald-600"><Wallet size={14} /></div>
                      <h3 className="font-bold text-slate-700 text-xs truncate max-w-[80px]">{config.cashAccountName}</h3>
                    </div>
                    <p className="text-[10px] text-slate-400 mb-0.5">当前余额</p>
                    <p className="text-lg font-bold text-slate-800 font-mono truncate">
                      ¥{summary.cashBalance.toLocaleString('zh-CN')}
                    </p>
                  </div>

                  <div className="bg-white rounded-[20px] p-4 border border-slate-100 shadow-sm active:bg-slate-50 transition-colors">
                    <div className="flex items-center space-x-1.5 mb-2">
                      <div className="bg-blue-100 p-1.5 rounded-lg text-blue-600"><Watch size={14} /></div>
                      <h3 className="font-bold text-slate-700 text-xs truncate max-w-[80px]">{config.fixedAssetName}</h3>
                    </div>
                    <p className="text-[10px] text-slate-400 mb-0.5">当前估值</p>
                    <p className="text-lg font-bold text-slate-800 font-mono truncate">
                      ¥{summary.dynamicWatchAsset.toLocaleString('zh-CN')}
                    </p>
                  </div>
                </section>

                {/* 记账表单 */}
                <section className="bg-white rounded-[24px] shadow-sm border border-slate-100 overflow-hidden mt-2">
                  <div className="flex border-b border-slate-50 relative">
                    <div className={`absolute bottom-0 h-0.5 bg-amber-500 transition-all duration-300 ${activeTab === 'gold' ? 'w-1/2 left-0' : 'w-1/2 left-1/2 bg-emerald-500'}`}></div>
                    <button onClick={() => setActiveTab('gold')} className={`flex-1 py-3.5 text-sm font-bold text-center transition-colors ${activeTab === 'gold' ? 'text-amber-600 bg-amber-50/30' : 'text-slate-400'}`}>
                      黄金买卖
                    </button>
                    <button onClick={() => setActiveTab('cash')} className={`flex-1 py-3.5 text-sm font-bold text-center transition-colors ${activeTab === 'cash' ? 'text-emerald-600 bg-emerald-50/30' : 'text-slate-400'}`}>
                      日常收支
                    </button>
                  </div>

                  <div className="p-4 md:p-5">
                    {/* 黄金表单 */}
                    {activeTab === 'gold' && (
                      <form onSubmit={handleGoldSubmit} className="space-y-3.5 animate-fade-in">
                        <div className="flex bg-slate-100 p-1 rounded-xl">
                          <label className={`flex-1 text-center py-2 text-sm rounded-lg cursor-pointer transition-all ${goldForm.type === 'gold_buy' ? 'bg-white shadow-sm font-bold text-amber-600' : 'text-slate-500 font-medium'}`}>
                            <input type="radio" name="g_type" value="gold_buy" checked={goldForm.type === 'gold_buy'} onChange={e => setGoldForm({...goldForm, type: e.target.value, paymentMethod: config.buyMethods[0] || ''})} className="hidden" />
                            买入入库
                          </label>
                          <label className={`flex-1 text-center py-2 text-sm rounded-lg cursor-pointer transition-all ${goldForm.type === 'gold_sell' ? 'bg-white shadow-sm font-bold text-blue-600' : 'text-slate-500 font-medium'}`}>
                            <input type="radio" name="g_type" value="gold_sell" checked={goldForm.type === 'gold_sell'} onChange={e => setGoldForm({...goldForm, type: e.target.value, paymentMethod: config.sellMethods[0] || ''})} className="hidden" />
                            卖出变现
                          </label>
                        </div>

                        <div className="grid grid-cols-2 gap-2.5">
                          <div>
                            <label className="block text-[11px] text-slate-500 mb-1 pl-1">日期</label>
                            <input type="date" value={goldForm.date} onChange={e => setGoldForm({...goldForm, date: e.target.value})} className="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm appearance-none" />
                          </div>
                          <div>
                            <label className="block text-[11px] text-slate-500 mb-1 pl-1">{goldForm.type === 'gold_buy' ? '支出资金池' : '收入资金池'}</label>
                            <select value={goldForm.paymentMethod} onChange={e => setGoldForm({...goldForm, paymentMethod: e.target.value})} className="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm appearance-none truncate">
                              {goldForm.type === 'gold_buy' ? config.buyMethods.map(m => <option key={m} value={m}>{m}</option>) : config.sellMethods.map(m => <option key={m} value={m}>{m}</option>)}
                            </select>
                          </div>
                        </div>

                        <div className="grid grid-cols-2 gap-2.5">
                          <div>
                            <label className="block text-[11px] text-slate-500 mb-1 pl-1">克数 (g)</label>
                            <input type="number" step="0.01" value={goldForm.grams} onChange={e => setGoldForm({...goldForm, grams: e.target.value})} placeholder="0.00" required className="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl outline-none font-mono text-base" />
                          </div>
                          <div>
                            <label className="block text-[11px] text-slate-500 mb-1 pl-1">实际成交单价 (元/g)</label>
                            <input type="number" step="0.01" value={goldForm.price} onChange={e => setGoldForm({...goldForm, price: e.target.value})} placeholder="例如: 1150" required className="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl outline-none font-mono text-base" />
                          </div>
                        </div>

                        <div>
                          <input type="text" value={goldForm.note} onChange={e => setGoldForm({...goldForm, note: e.target.value})} placeholder="备注：如 金条/金豆/首饰款式..." className="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm" />
                        </div>

                        <button type="submit" className={`w-full py-3.5 mt-2 text-white rounded-xl font-bold text-base transition-transform active:scale-95 flex justify-center items-center shadow-lg ${goldForm.type === 'gold_buy' ? 'bg-amber-500 hover:bg-amber-600 shadow-amber-500/30' : 'bg-blue-500 hover:bg-blue-600 shadow-blue-500/30'}`}>
                          <PlusCircle size={18} className="mr-2" /> 确认保存记录
                        </button>
                      </form>
                    )}

                    {/* 现金表单 */}
                    {activeTab === 'cash' && (
                      <form onSubmit={handleCashSubmit} className="space-y-3.5 animate-fade-in">
                        <div className="flex bg-slate-100 p-1 rounded-xl">
                          <label className={`flex-1 text-center py-2 text-sm rounded-lg cursor-pointer transition-all ${cashForm.type === 'cash_expense' ? 'bg-white shadow-sm font-bold text-red-500' : 'text-slate-500 font-medium'}`}>
                            <input type="radio" name="c_type" value="cash_expense" checked={cashForm.type === 'cash_expense'} onChange={e => setCashForm({...cashForm, type: e.target.value, paymentMethod: '现金'})} className="hidden" />
                            支出款项
                          </label>
                          <label className={`flex-1 text-center py-2 text-sm rounded-lg cursor-pointer transition-all ${cashForm.type === 'cash_income' ? 'bg-white shadow-sm font-bold text-emerald-600' : 'text-slate-500 font-medium'}`}>
                            <input type="radio" name="c_type" value="cash_income" checked={cashForm.type === 'cash_income'} onChange={e => setCashForm({...cashForm, type: e.target.value, paymentMethod: '现金'})} className="hidden" />
                            收入进账
                          </label>
                        </div>

                        <div className="grid grid-cols-2 gap-2.5">
                          <div>
                            <label className="block text-[11px] text-slate-500 mb-1 pl-1">发生日期</label>
                            <input type="date" value={cashForm.date} onChange={e => setCashForm({...cashForm, date: e.target.value})} className="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm appearance-none" />
                          </div>
                          <div>
                            <label className="block text-[11px] text-slate-500 mb-1 pl-1">关联资产项</label>
                            <select value={cashForm.paymentMethod} onChange={e => setCashForm({...cashForm, paymentMethod: e.target.value})} className="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm appearance-none">
                              <option value="现金">现金账户</option>
                              <option value="手表">固定资产</option>
                            </select>
                          </div>
                        </div>

                        <div>
                          <label className="block text-[11px] text-slate-500 mb-1 pl-1">交易金额 (元)</label>
                          <input type="number" step="0.01" value={cashForm.amount} onChange={e => setCashForm({...cashForm, amount: e.target.value})} placeholder="0.00" required className="w-full px-4 py-3 text-2xl font-bold font-mono text-slate-800 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-emerald-500/50" />
                        </div>

                        <div>
                          <input type="text" value={cashForm.note} onChange={e => setCashForm({...cashForm, note: e.target.value})} placeholder="简单描述一下用途..." required className="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm" />
                        </div>

                        <button type="submit" className={`w-full py-3.5 mt-2 text-white rounded-xl font-bold text-base transition-transform active:scale-95 flex justify-center items-center shadow-lg ${cashForm.type === 'cash_expense' ? 'bg-red-500 hover:bg-red-600 shadow-red-500/30' : 'bg-emerald-500 hover:bg-emerald-600 shadow-emerald-500/30'}`}>
                          <PlusCircle size={18} className="mr-2" /> 确认保存明细
                        </button>
                      </form>
                    )}
                  </div>
                </section>

                {/* 账单明细列表 (取消固定高度，让页面自然向下延伸) */}
                <section className="bg-white rounded-[24px] shadow-sm border border-slate-100 p-4 md:p-5 mt-4 min-h-[300px]">
                  <h2 className="text-base font-bold text-slate-800 mb-4 px-1 flex items-center border-b border-slate-50 pb-3">
                    历史流水记录 <span className="ml-2 text-xs font-normal text-slate-400 bg-slate-100 px-2 py-0.5 rounded-full">{transactions.length} 笔</span>
                  </h2>
                  
                  <div className="space-y-2.5 pb-2">
                    {transactions.length === 0 ? (
                      <div className="py-12 flex flex-col items-center justify-center text-slate-400">
                        <Wallet size={32} className="mb-2 opacity-20"/>
                        <p className="text-sm">还没有任何记录哦</p>
                      </div>
                    ) : (
                      transactions.map(t => (
                        <div key={t.id} className="flex items-center justify-between p-3.5 rounded-2xl bg-slate-50/80 active:bg-slate-100 transition-colors border border-slate-100/50">
                          <div className="flex items-center space-x-3 w-[60%]">
                            <div className={`w-9 h-9 rounded-full flex items-center justify-center shrink-0 ${
                              t.type.includes('gold') ? 'bg-amber-100 text-amber-600' : 
                              t.type === 'cash_income' ? 'bg-emerald-100 text-emerald-600' : 'bg-red-100 text-red-500'
                            }`}>
                              {t.type.includes('gold') ? <Coins size={18} /> : <Wallet size={18} />}
                            </div>
                            <div className="min-w-0 flex-1">
                              <div className="font-bold text-slate-800 text-[13px] truncate pr-2">{t.note || '未命名明细'}</div>
                              <div className="text-[10px] text-slate-500 mt-0.5 flex items-center">
                                <span>{t.date.substring(5)}</span> {/* 简写日期 */}
                                <span className="mx-1 text-slate-300">|</span>
                                <span className="font-medium text-slate-600 truncate">{t.paymentMethod}</span>
                              </div>
                            </div>
                          </div>

                          <div className="flex items-center space-x-2 shrink-0">
                            <div className="text-right">
                              {t.type.includes('gold') ? (
                                <div className={`font-bold text-[15px] font-mono ${t.type === 'gold_buy' ? 'text-amber-600' : 'text-blue-600'}`}>
                                  {t.type === 'gold_buy' ? '+' : '-'}{t.grams}g
                                </div>
                              ) : (
                                <div className={`font-bold text-[15px] font-mono ${t.type === 'cash_income' ? 'text-emerald-600' : 'text-slate-800'}`}>
                                  {t.type === 'cash_income' ? '+' : '-'}{t.amount.toLocaleString('zh-CN', {minimumFractionDigits: 1, maximumFractionDigits:2})}
                                </div>
                              )}
                              <div className="text-[9px] text-slate-400 mt-0.5">
                                {t.type.includes('gold') ? `单价 ¥${t.price}` : '总额'}
                              </div>
                            </div>
                            <button onClick={() => requestDelete(t.id)} className="text-slate-300 active:text-red-500 p-1.5 ml-1 transition-colors">
                              <Trash2 size={16} />
                            </button>
                          </div>
                        </div>
                      ))
                    )}
                  </div>
                </section>

              </div> {/* End of main content container */}
              
              {/* 弹窗组件挂载点 */}
              <CalculatorModal isOpen={isCalcOpen} onClose={() => setIsCalcOpen(false)} />
              <SettingsModal isOpen={isSettingsOpen} onClose={() => setIsSettingsOpen(false)} config={config} setConfig={setConfig} />

              {deleteConfirm.isOpen && (
                <div className="fixed inset-0 z-[60] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-5 animate-fade-in">
                  <div className="bg-white rounded-3xl shadow-2xl w-full max-w-[300px] p-6 text-center">
                    <div className="w-12 h-12 bg-red-100 text-red-500 rounded-full flex items-center justify-center mx-auto mb-3">
                        <Trash2 size={24} />
                    </div>
                    <h3 className="text-lg font-bold text-slate-800 mb-2">确认删除？</h3>
                    <p className="text-slate-500 text-xs mb-6">删除后相关资产会立刻重算，该记录无法恢复。</p>
                    <div className="flex space-x-3">
                      <button onClick={() => setDeleteConfirm({ isOpen: false, id: null })} className="flex-1 py-3 text-sm font-bold text-slate-600 bg-slate-100 rounded-xl active:bg-slate-200">算了</button>
                      <button onClick={confirmDelete} className="flex-1 py-3 text-sm font-bold text-white bg-red-500 rounded-xl active:bg-red-600 shadow-md shadow-red-500/30">确定删</button>
                    </div>
                  </div>
                </div>
              )}

            </div>
          );
        }

        // ==========================================
        // 5. 渲染整个应用到 DOM
        // ==========================================
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
